version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: marketing_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: marketing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: marketing_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: